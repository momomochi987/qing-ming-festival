<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清院本清明上河圖 — 任務健康報告</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div>
    <h1 data-i18n="title">清院本清明上河圖</h1>
    <div class="meta">
      <span data-i18n="total"></span>　｜
      <span data-i18n="updated-label"></span>：<span id="updated"></span>　｜
      <a href="https://www.bannergress.com/banner/%E6%B8%85%E9%99%A2%E6%9C%AC%E6%B8%85%E6%98%8E%E4%B8%8A%E6%B2%B3%E5%9C%96-a966" target="_blank" data-i18n="view-bg"></a>　｜
      <a href="https://t.me/QingMingFestival_1152missions" target="_blank" data-i18n="view-tg"></a>
    </div>
  </div>
  <div class="header-controls">
    <button class="ctrl-btn lang-active" id="btn-zh" onclick="setLang('zh')">繁中</button>
    <button class="ctrl-btn"            id="btn-en" onclick="setLang('en')">EN</button>
    <button class="ctrl-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
  </div>
</header>

<div class="summary">
  <div class="card ok"       onclick="setFilter('OK')">
    <div class="num" id="cnt-ok">—</div><div class="lbl" data-i18n="lbl-ok"></div>
  </div>
  <div class="card risk"     onclick="setFilter('AT_RISK')">
    <div class="num" id="cnt-risk">—</div><div class="lbl" data-i18n="lbl-risk"></div>
  </div>
  <div class="card critical" onclick="setFilter('CRITICAL')">
    <div class="num" id="cnt-critical">—</div><div class="lbl" data-i18n="lbl-critical"></div>
  </div>
  <div class="card dead"     onclick="setFilter('DEAD')">
    <div class="num" id="cnt-dead">—</div><div class="lbl" data-i18n="lbl-dead"></div>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="search" oninput="render()">
  </div>
  <button class="btn active"        id="btn-all"      onclick="setFilter('all')"      data-i18n="btn-all"></button>
  <button class="btn dead-btn"      id="btn-dead"     onclick="setFilter('DEAD')"     data-i18n="btn-dead"></button>
  <button class="btn critical-btn"  id="btn-critical" onclick="setFilter('CRITICAL')" data-i18n="btn-critical"></button>
  <button class="btn risk-btn"      id="btn-risk"     onclick="setFilter('AT_RISK')"  data-i18n="btn-risk"></button>
  <button class="btn ok-btn"        id="btn-ok"       onclick="setFilter('OK')"       data-i18n="btn-ok"></button>
  <span class="result-count" id="result-count"></span>
</div>

<div class="table-section">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-sort="pos"     onclick="sortBy('pos')">#<span class="sort-ind"></span></th>
          <th data-i18n="th-thumb"></th>
          <th data-sort="status"  onclick="sortBy('status')" data-i18n="th-status"></th>
          <th data-i18n="th-name"></th>
          <th data-sort="missing" onclick="sortBy('missing')" data-i18n="th-missing"></th>
          <th data-sort="total"   onclick="sortBy('total')"   data-i18n="th-total"></th>
          <th data-sort="pct"     onclick="sortBy('pct')"     data-i18n="th-pct"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<footer data-i18n="footer"></footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
